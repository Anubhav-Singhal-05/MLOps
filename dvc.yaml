stages:
  preprocess:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - airline.csv.shuffle
    outs:
      - data/processed

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed
    outs:
      - models/model

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/model
      - data/test