stages:
  preprocess:
    cmd: docker exec spark-master /opt/spark/bin/spark-submit /project/src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data/airline.csv.shuffle
      - data/carriers.csv
    outs:
      - data/processed

  train:
    cmd: docker exec spark-master /opt/spark/bin/spark-submit /project/src/train.py
    deps:
      - src/train.py
      - data/processed
    outs:
      - models/
      - data/test

  evaluate:
    cmd: docker exec spark-master /opt/spark/bin/spark-submit /project/src/evaluate.py
    deps:
      - src/evaluate.py
      - models/
      - data/test
    metrics:
      - metrics.json:
          cache: false